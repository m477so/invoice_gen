<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#0E1413;
    --bg-soft:#161F1D;
    --card:#1B2624;
    --card-2:#212E2B;
    --line:#33433F;
    --ink:#EDEFEC;
    --muted:#8FA39D;
    --accent:#7FE3B4;
    --accent-dim:#2E4A41;
    --warn:#F2A65A;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'IBM Plex Sans', Arial, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--sans);
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(127,227,180,0.10), transparent 60%),
      radial-gradient(900px 500px at 0% 100%, rgba(127,227,180,0.06), transparent 60%),
      var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  .wrap{
    max-width:1000px;
    margin:0 auto;
    padding:48px 24px 90px;
  }

  header.page-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:36px;
    padding-bottom:24px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
    gap:16px;
  }
  header.page-head .title-block{
    display:flex;
    align-items:baseline;
    gap:16px;
    flex-wrap:wrap;
  }
  header.page-head h1{
    font-family:var(--serif);
    font-weight:600;
    font-size:clamp(32px,6vw,48px);
    margin:0;
    letter-spacing:-0.01em;
    background:linear-gradient(135deg, var(--ink) 40%, var(--accent) 120%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  header.page-head .invoice-no{
    font-family:var(--mono);
    font-size:13px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  header.page-head .invoice-no input{
    width:110px;
    font-family:var(--mono);
    font-size:13px;
    padding:7px 10px;
  }
  header.page-head .tag{
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.16em;
    color:var(--accent);
    border:1px solid var(--accent-dim);
    background:rgba(127,227,180,0.06);
    padding:7px 12px;
    border-radius:100px;
    white-space:nowrap;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
  }
  @media (max-width:760px){ .grid{grid-template-columns:1fr;} }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px 26px;
    box-shadow:0 1px 0 rgba(255,255,255,0.02) inset, 0 20px 40px -28px rgba(0,0,0,0.6);
  }
  .card h2{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 18px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .card h2::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--line);
  }

  label{
    display:block;
    font-size:12px;
    font-weight:500;
    color:var(--muted);
    margin:0 0 6px;
  }
  .field{margin-bottom:16px;}
  .field:last-child{margin-bottom:0;}
  input, textarea{
    width:100%;
    font-family:var(--sans);
    font-size:14px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--bg-soft);
    color:var(--ink);
    transition:border-color .15s, box-shadow .15s, background .15s;
  }
  input::placeholder, textarea::placeholder{ color:#5A6B66; }
  input:focus, textarea:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(127,227,180,0.12);
    background:var(--card-2);
  }
  textarea{resize:vertical; min-height:64px; font-family:var(--sans); line-height:1.5;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  /* Line items */
  .items-card{margin-bottom:20px;}
  table.items{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
  }
  table.items th{
    text-align:left;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    font-weight:500;
    padding:0 10px 10px;
    border-bottom:1px solid var(--line);
  }
  table.items th.num, table.items td.num{text-align:right;}
  table.items td{
    padding:10px 10px;
    border-bottom:1px solid rgba(51,67,63,0.5);
    vertical-align:middle;
  }
  table.items tr:last-child td{ border-bottom:none; }
  table.items td.desc input{font-size:14px;}
  table.items td input{
    border:1px solid transparent;
    background:transparent;
    padding:9px 8px;
    border-radius:6px;
  }
  table.items td input:focus{
    background:var(--bg-soft);
    border-color:var(--accent);
    box-shadow:none;
  }
  table.items td.line-total{
    font-family:var(--mono);
    text-align:right;
    white-space:nowrap;
    font-weight:500;
    color:var(--accent);
  }
  table.items td.remove{
    width:36px;
    text-align:center;
  }
  .remove-btn{
    background:none;
    border:none;
    color:var(--warn);
    cursor:pointer;
    font-size:18px;
    line-height:1;
    padding:6px;
    opacity:0.5;
    transition:opacity .15s, transform .15s;
    border-radius:6px;
  }
  .remove-btn:hover{opacity:1; background:rgba(242,166,90,0.1);}

  .col-qty, .col-rate{width:100px;}
  .col-total{width:120px;}

  .add-row{
    margin-top:16px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:none;
    border:1px dashed var(--line);
    color:var(--accent);
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.06em;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .add-row:hover{border-color:var(--accent); background:rgba(127,227,180,0.06);}

  /* Totals */
  .totals{
    margin-top:24px;
    display:flex;
    justify-content:flex-end;
  }
  .totals-table{
    width:300px;
    font-size:14px;
  }
  .totals-table .trow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid rgba(51,67,63,0.5);
    color:var(--muted);
  }
  .totals-table .trow.grand{
    border-bottom:none;
    border-top:1px solid var(--line);
    margin-top:6px;
    padding-top:16px;
    font-family:var(--serif);
    font-size:26px;
    font-weight:600;
    color:var(--ink);
  }
  .totals-table .trow.grand .amt{ color:var(--accent); }
  .totals-table .trow input{
    width:64px;
    text-align:right;
    padding:6px 8px;
    font-family:var(--mono);
    font-size:13px;
  }
  .totals-table .trow span.amt{
    font-family:var(--mono);
  }
  .tax-row span:first-child{
    display:flex; align-items:center; gap:8px;
  }

  /* Notes */
  .notes-card{margin-bottom:28px;}

  .actions{
    display:flex;
    gap:12px;
    justify-content:flex-end;
    flex-wrap:wrap;
  }
  button.primary{
    background:var(--accent);
    color:#0E1413;
    border:none;
    font-family:var(--mono);
    font-size:13px;
    font-weight:500;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:15px 30px;
    border-radius:10px;
    cursor:pointer;
    transition:transform .12s, box-shadow .15s, filter .15s;
    box-shadow:0 8px 24px -8px rgba(127,227,180,0.5);
  }
  button.primary:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  button.primary:active{transform:translateY(0px);}

  .currency-inline{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .currency-inline input{
    width:46px;
    text-align:center;
    padding:6px 6px;
    font-family:var(--mono);
  }

  @media print{
    body{background:#fff; color:#000;}
  }
</style>
</head>
<body>

<div class="wrap">

  <header class="page-head">
    <div class="title-block">
      <h1>Invoice</h1>
      <div class="invoice-no">
        <span>No.</span> <input id="invoiceNo" value="0001">
        <span>Date</span> <input id="invoiceDate" type="date">
      </div>
    </div>
    <div class="tag">Editable draft</div>
  </header>

  <div class="grid">
    <div class="card">
      <h2>From</h2>
      <div class="field"><label>Your name / business</label><input id="fromName" placeholder="Jane Smith Cleaning"></div>
      <div class="field"><label>Address</label><textarea id="fromAddress" placeholder="123 Main St, London"></textarea></div>
      <div class="field"><label>Email / phone</label><input id="fromContact" placeholder="jane@example.com · 07000 000000"></div>
    </div>
    <div class="card">
      <h2>Bill to</h2>
      <div class="field"><label>Client name</label><input id="toName" placeholder="John Doe"></div>
      <div class="field"><label>Address</label><textarea id="toAddress" placeholder="456 Oak Ave, London"></textarea></div>
      <div class="field"><label>Email / phone</label><input id="toContact" placeholder="john@example.com"></div>
    </div>
  </div>

  <div class="card items-card">
    <h2>Line items</h2>
    <table class="items">
      <thead>
        <tr>
          <th>Description</th>
          <th class="num col-qty">Hours / Qty</th>
          <th class="num col-rate">Rate</th>
          <th class="num col-total">Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>
    <button class="add-row" id="addRow">+ Add line</button>

    <div class="totals">
      <div class="totals-table">
        <div class="trow"><span>Subtotal</span><span class="amt" id="subtotal">£0.00</span></div>
        <div class="trow tax-row">
          <span>Tax <input id="taxRate" type="number" value="0" min="0" step="0.5">%</span>
          <span class="amt" id="taxAmount">£0.00</span>
        </div>
        <div class="trow grand"><span>Total</span><span class="amt" id="grandTotal">£0.00</span></div>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Due date &amp; currency</h2>
      <div class="row2">
        <div class="field"><label>Due date</label><input id="dueDate" type="date"></div>
        <div class="field"><label>Currency symbol</label>
          <div class="currency-inline">
            <input id="currency" value="£">
          </div>
        </div>
      </div>
    </div>
    <div class="card notes-card">
      <h2>Notes &amp; payment details</h2>
      <div class="field"><textarea id="notes" placeholder="Thank you for your business! Payment due within 14 days.&#10;&#10;Account name: ...&#10;Sort code / Account no: ..." style="min-height:108px;"></textarea></div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="downloadPdf">Download PDF</button>
  </div>

</div>

<script>
const itemsBody = document.getElementById('itemsBody');
const currencyInput = document.getElementById('currency');
const taxRateInput = document.getElementById('taxRate');

function rowTemplate(desc='', qty=1, rate=0){
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="desc"><input type="text" class="i-desc" placeholder="e.g. House cleaning – living room & kitchen" value="${desc}"></td>
    <td class="num"><input type="number" class="i-qty" min="0" step="0.25" value="${qty}"></td>
    <td class="num"><input type="number" class="i-rate" min="0" step="0.01" value="${rate}"></td>
    <td class="line-total i-amount">£0.00</td>
    <td class="remove"><button class="remove-btn" title="Remove line">×</button></td>
  `;
  itemsBody.appendChild(tr);
  attachRowEvents(tr);
  recalc();
}

function attachRowEvents(tr){
  tr.querySelectorAll('.i-qty, .i-rate').forEach(el => el.addEventListener('input', recalc));
  tr.querySelector('.remove-btn').addEventListener('click', () => {
    tr.remove();
    recalc();
  });
}

function recalc(){
  let subtotal = 0;
  const cur = currencyInput.value || '';
  itemsBody.querySelectorAll('tr').forEach(tr => {
    const qty = parseFloat(tr.querySelector('.i-qty').value) || 0;
    const rate = parseFloat(tr.querySelector('.i-rate').value) || 0;
    const amount = qty * rate;
    tr.querySelector('.i-amount').textContent = cur + amount.toFixed(2);
    subtotal += amount;
  });
  const tax = parseFloat(taxRateInput.value) || 0;
  const taxAmount = subtotal * (tax/100);
  const total = subtotal + taxAmount;
  document.getElementById('subtotal').textContent = cur + subtotal.toFixed(2);
  document.getElementById('taxAmount').textContent = cur + taxAmount.toFixed(2);
  document.getElementById('grandTotal').textContent = cur + total.toFixed(2);
}

taxRateInput.addEventListener('input', recalc);
currencyInput.addEventListener('input', recalc);

document.getElementById('addRow').addEventListener('click', () => rowTemplate());

// seed with example rows
rowTemplate('House cleaning — standard service', 3, 25);
rowTemplate('Window cleaning (add-on)', 1, 15);

// default date = today
document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];

// ---- PDF generation ----
document.getElementById('downloadPdf').addEventListener('click', () => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 50;
  let y = 60;

  const ink = [31, 42, 36];
  const accent = [38, 130, 96];
  const grey = [120, 130, 125];
  const line = [220, 224, 220];

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(28);
  doc.setTextColor(...ink);
  doc.text('INVOICE', margin, y);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(...grey);
  const invNo = document.getElementById('invoiceNo').value || '';
  const invDate = document.getElementById('invoiceDate').value || '';
  const dueDate = document.getElementById('dueDate').value || '';
  doc.text(`No. ${invNo}`, pageW - margin, y - 14, { align: 'right' });
  doc.text(`Date: ${invDate}`, pageW - margin, y, { align: 'right' });
  if (dueDate) doc.text(`Due: ${dueDate}`, pageW - margin, y + 14, { align: 'right' });

  y += 20;
  doc.setDrawColor(...ink);
  doc.setLineWidth(1.2);
  doc.line(margin, y, pageW - margin, y);
  y += 30;

  // From / To
  const colW = (pageW - margin*2 - 20) / 2;
  function block(title, name, address, contact, x){
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(...grey);
    doc.text(title.toUpperCase(), x, y);
    let yy = y + 16;
    doc.setTextColor(...ink);
    if (name) { doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.text(name, x, yy); yy += 16; }
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    if (address) { doc.text(doc.splitTextToSize(address, colW), x, yy); yy += doc.splitTextToSize(address, colW).length * 13; }
    if (contact) { doc.text(contact, x, yy); yy += 13; }
    return yy;
  }
  const y1 = block('From', document.getElementById('fromName').value, document.getElementById('fromAddress').value, document.getElementById('fromContact').value, margin);
  const y2 = block('Bill to', document.getElementById('toName').value, document.getElementById('toAddress').value, document.getElementById('toContact').value, margin + colW + 20);
  y = Math.max(y1, y2) + 20;

  doc.setDrawColor(...line);
  doc.setLineWidth(0.5);
  doc.line(margin, y, pageW - margin, y);
  y += 20;

  // Table header
  const cur = currencyInput.value || '';
  const colDesc = margin;
  const colQty = pageW - margin - 230;
  const colRate = pageW - margin - 150;
  const colAmt = pageW - margin;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.setTextColor(...grey);
  doc.text('DESCRIPTION', colDesc, y);
  doc.text('QTY/HRS', colQty, y, { align: 'right' });
  doc.text('RATE', colRate, y, { align: 'right' });
  doc.text('AMOUNT', colAmt, y, { align: 'right' });
  y += 8;
  doc.setDrawColor(...line);
  doc.line(margin, y, pageW - margin, y);
  y += 18;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(...ink);

  let subtotal = 0;
  itemsBody.querySelectorAll('tr').forEach(tr => {
    const desc = tr.querySelector('.i-desc').value || '';
    const qty = parseFloat(tr.querySelector('.i-qty').value) || 0;
    const rate = parseFloat(tr.querySelector('.i-rate').value) || 0;
    const amount = qty * rate;
    subtotal += amount;

    const descLines = doc.splitTextToSize(desc, colQty - colDesc - 20);
    doc.text(descLines, colDesc, y);
    doc.text(String(qty), colQty, y, { align: 'right' });
    doc.text(cur + rate.toFixed(2), colRate, y, { align: 'right' });
    doc.text(cur + amount.toFixed(2), colAmt, y, { align: 'right' });

    const rowH = Math.max(descLines.length, 1) * 14 + 6;
    y += rowH;
    doc.setDrawColor(...line);
    doc.line(margin, y - 4, pageW - margin, y - 4);
  });

  y += 10;
  const tax = parseFloat(taxRateInput.value) || 0;
  const taxAmount = subtotal * (tax/100);
  const total = subtotal + taxAmount;

  doc.setFontSize(10);
  doc.text('Subtotal', colRate, y, { align: 'right' });
  doc.text(cur + subtotal.toFixed(2), colAmt, y, { align: 'right' });
  y += 16;

  if (tax > 0) {
    doc.text(`Tax (${tax}%)`, colRate, y, { align: 'right' });
    doc.text(cur + taxAmount.toFixed(2), colAmt, y, { align: 'right' });
    y += 16;
  }

  doc.setDrawColor(...ink);
  doc.setLineWidth(1.2);
  doc.line(colRate - 60, y, pageW - margin, y);
  y += 18;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(15);
  doc.setTextColor(...accent);
  doc.text('Total', colRate, y, { align: 'right' });
  doc.text(cur + total.toFixed(2), colAmt, y, { align: 'right' });

  y += 40;
  doc.setTextColor(...ink);

  const notes = document.getElementById('notes').value;

  if (notes) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(...grey);
    doc.text('NOTES & PAYMENT DETAILS', margin, y);
    y += 16;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(...ink);
    const lines = doc.splitTextToSize(notes, pageW - margin*2);
    doc.text(lines, margin, y);
  }

  const fileName = `invoice-${invNo || 'draft'}.pdf`;
  doc.save(fileName);
});
</script>

</body>
</html>
